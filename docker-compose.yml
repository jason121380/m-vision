services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mvision
      POSTGRES_PASSWORD: mvision
      POSTGRES_DB: mvision
    ports:
      - '5432:5432'
    volumes:
      - mvision-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mvision']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mvision-postgres:
